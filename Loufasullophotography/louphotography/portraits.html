<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Photography Gallery | LouFasullo Photography Vancouver</title>
    <meta name="description" content="Professional portrait photography for couples, families, and individuals in Vancouver BC. Timeless images capturing your authentic essence.">
    <meta name="keywords" content="portrait photography Vancouver, couple portraits BC, family photography Vancouver, professional portraits, individual portraits photographer">
    <meta name="author" content="LouFasullo Photography">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.loufasullo.com/portraits.html">

    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-glass: rgba(255, 255, 255, 0.05);
            --text: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #d4c5b3;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg: #EDE8D0;
            --surface: #f9f7f5;
            --surface-glass: rgba(255, 255, 255, 0.4);
            --text: #1a1a1a;
            --text-muted: #666666;
            --accent: #b5a48d;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: var(--transition);
        }

        h1, h2, h3, .brand {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
        }

        .brand {
            font-size: 1.5rem;
            letter-spacing: 2px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .nav-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        nav ul {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav ul li a {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        nav ul li a:hover {
            color: var(--accent);
        }

        .theme-switch {
            display: inline-flex;
            align-items: center;
            position: relative;
            width: 50px;
            height: 26px;
            cursor: pointer;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .track {
            position: absolute;
            inset: 0;
            background: var(--surface);
            border-radius: 26px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            transition: var(--transition);
        }

        input:checked ~ .thumb {
            transform: translateX(24px);
        }

        .icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            pointer-events: none;
        }

        .icon-sun {
            left: 6px;
            color: var(--text-muted);
        }

        .icon-moon {
            right: 6px;
            color: var(--text-muted);
        }

        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&q=80&w=2000') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            margin-top: 70px;
        }

        .hero h1 {
            font-size: 4.5rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 700px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        section {
            padding: 100px 5%;
            max-width: 1800px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            aspect-ratio: 3/4;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 968px) {
            nav ul { display: none; }
            .hero h1 { font-size: 2.5rem; }
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#process">Process</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
            </ul>
        </nav>
        <a href="index.html" class="brand">LOUFASULLO</a>
        <nav class="nav-right">
            <ul>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="index.html#gallery">Gallery</a></li>
                <li><a href="index.html#pricing">Pricing</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li>
                    <label class="theme-switch">
                        <input type="checkbox" id="theme-checkbox" onchange="toggleTheme()">
                        <span class="track"></span>
                        <span class="thumb"></span>
                        <span class="icon icon-sun"><i class="fas fa-sun"></i></span>
                        <span class="icon icon-moon"><i class="fas fa-moon"></i></span>
                    </label>
                </li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <h1>Portrait Sessions</h1>
        <p>Timeless images capturing your authentic essence</p>
    </div>

    <section>
        <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 20px;">Authentic Portraits</h2>
        <p style="text-align: center; color: var(--text-muted); max-width: 700px; margin: 0 auto;">
            Professional photography for couples, families, and individuals
        </p>

        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&q=80&w=800" alt="Couple portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&q=80&w=800" alt="Individual portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&q=80&w=800" alt="Portrait detail">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=800" alt="Formal portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?auto=format&fit=crop&q=80&w=800" alt="Natural light portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?auto=format&fit=crop&q=80&w=800" alt="Family portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=800" alt="Candid portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&q=80&w=800" alt="Professional portrait">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=800" alt="Studio portrait">
            </div>
        </div>
    </section>

    <script>
        function toggleTheme() {
            var cb = document.getElementById('theme-checkbox');
            var isDark = cb.checked;
            var theme = isDark ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        (function() {
            var saved = localStorage.getItem('theme');
            var cb = document.getElementById('theme-checkbox');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                cb.checked = true;
            }
        })();
    </script>
</body>
</html>
